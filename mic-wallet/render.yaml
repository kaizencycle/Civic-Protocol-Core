services:
  - type: web
    name: mobius-mic-wallet
    env: python
    plan: starter
    region: oregon
    runtime: python
    rootDir: mic-wallet
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # C-360 / C-379: persistent disk — without this, wallet balances reset every deploy.
    # Render requires a paid plan (starter+) for persistent disks on web services.
    disk:
      name: mic-wallet-data
      mountPath: /var/lib/mic-wallet
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PORT
        value: "8001"
