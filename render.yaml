services:
  # Civic Ledger API - The Blockchain Kernel
  - type: web
    name: civic-ledger-api
    env: python
    # Ledger deps live in ledger/requirements.txt; root requirements.txt also lists them for single-pip installs.
    buildCommand: pip install -r requirements.txt && pip install -r ledger/requirements.txt
    # Clear dashboard "Start Command" so this runs; override may use: uvicorn ledger.app.main:app --host 0.0.0.0 --port $PORT (no trailing dot on host).
    startCommand: python3 scripts/render_start_ledger.py
    healthCheckPath: /health
    # C-331: persistent disk for the core ledger SQLite db. db.py writes events,
    # identities, mesh_entries, epicon_entries, seal_records to a FILE (it does
    # NOT use DATABASE_URL), so durability requires a non-ephemeral mount.
    disk:
      name: ledger-data
      mountPath: /var/lib/ledger
      sizeGB: 1
    envVars:
      # Ensures `import ledger` works when Start Command is overridden to
      # `uvicorn ledger.app.main:app` (cwd may not be the repo root).
      - key: PYTHONPATH
        value: .
      # PostgreSQL for the vault layer (database.py) only.
      - key: DATABASE_URL
        sync: false
      # C-331: core ledger file path — must match disk mountPath above.
      - key: LEDGER_DATA_DIR
        value: /var/lib/ledger
      - key: LAB4_API_BASE
        value: https://hive-api-2le8.onrender.com
      - key: LAB6_API_BASE
        value: https://lab6-proof-api.onrender.com
      - key: MOBIUS_MESH_TOKEN
        sync: false
      - key: OAA_MEMORY_API_TOKEN
        sync: false
      - key: AGENT_SERVICE_TOKEN
        sync: false
      - key: GI_STATE_JSON
        sync: false
      - key: HYBRID_LEDGER_MODE
        sync: false
      - key: IPFS_API_ADDR
        sync: false
      - key: IPFS_PIN_ON_INGEST
        value: "true"

  # MIC Indexer - Mobius Integrity Credit balance computation
  - type: web
    name: mic-indexer
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r mic-indexer/requirements.txt
    startCommand: cd mic-indexer && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LAB4_BASE
        sync: false
      - key: LEDGER_MESH_IPFS_URL
        sync: false
      - key: IPFS_API_ADDR
        sync: false
      - key: POLICY_PATH
        value: ./policy.yaml
      - key: INDEX_DB
        value: ./data/index.db
      - key: MIC_DB_URL
        sync: false
      - key: MIC_API_KEY
        sync: false

  # Identity Service - Authentication and identity management
  - type: web
    name: mobius-identity
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r identity/requirements.txt
    startCommand: cd identity && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"

  # Render → Routine shim (Option B) — reshapes Render deploy webhook into
  # {"text": ...} and forwards to the Mobius Deploy-Drift Sentinel /fire endpoint.
  # Point Render's deploy webhook at: https://<shim-host>/render-deploy
  # Required env vars: ROUTINE_TRIGGER_ID, ROUTINE_TOKEN, SHIM_SECRET (optional).
  - type: web
    name: render-routine-shim
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r scripts/render_routine_shim/requirements.txt
    startCommand: cd scripts/render_routine_shim && uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ROUTINE_TRIGGER_ID
        sync: false
      - key: ROUTINE_TOKEN
        sync: false
      - key: SHIM_SECRET
        sync: false

  # MIC Wallet Service - MIC earning and wallet management
  - type: web
    name: mobius-mic-wallet
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r mic-wallet/requirements.txt
    startCommand: cd mic-wallet && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false  # Must match Identity Service SECRET_KEY
      - key: PORT
        value: "8000"
