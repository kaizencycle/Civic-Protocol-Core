# mobius.yaml — Mobius node declaration contract (schema v1.1, C-292)
# Canon: this file declares identity, pulse, ingest, proof policy, and MCP surface.
# It does not perform writes. Writers read targets from peer manifests / registry.

version: "1.1"

mesh:
  enabled: true
  node_id: "civic-protocol-core"
  node_name: "Civic Protocol Core"
  tier: "ledger"
  role: "ledger_node"

  repository:
    full_name: "kaizencycle/Civic-Protocol-Core"
    default_branch: "main"

  discovery:
    enabled: true
    registry_participation: true

  civic_mesh:
    phase: 2
    role: "proof_spine"
    upstream_memory: "kaizencycle/Mobius-Substrate"
    upstream_pulse: "kaizencycle/mobius-civic-ai-terminal"
    canon: "Ledger proves selectively. It does not store the whole river."

  substrate_ref: "kaizencycle/Mobius-Substrate"
  covenant: "integrity"
  agent_affinity:
    - ZEUS
    - HERMES
    - JADE

pulse:
  enabled: true
  health_url: "https://civic-protocol-core-ledger.onrender.com/health"
  feed_url: "https://civic-protocol-core-ledger.onrender.com/epicon/feed"
  snapshot_url: ""
  freshness_sla_seconds: 900
  integrity_weight: 1.25
  lanes:
    - ledger
    - epicon
    - mesh
    - mcp
    - proof
  authoritative_for:
    - ledger
    - epicon_ingest
    - durable_write
    - proof_attestation
  emits:
    heartbeat: false
    gi: false
    mii: false
    mic: false
    vault: false
    tripwire: false
    anomalies: false
    proof: true

ingest:
  enabled: true
  mode: "ledger_target"
  write_url: "https://civic-protocol-core-ledger.onrender.com/mesh/ingest"
  auth: "bearer"
  idempotency:
    required: true
    key_fields:
      - node_id
      - event_type
      - cycle
      - source_hash
      - workflow_id
    duplicate_policy: "ignore_existing_key"
  proof_policy:
    accept_only_proof_worthy: true
    terminal_hot_rows_direct_to_ledger: false
    substrate_memory_required_for_bulk_journals: true
    proof_worthy_events:
      - EPICON_ENTRY_V1
      - MIC_READINESS_V1
      - MIC_SEAL_V1
      - MIC_RESERVE_RECONCILIATION_V1
      - MIC_GENESIS_BLOCK
      - MOBIUS_PULSE_V1
      - OAA_MEMORY_ENTRY_V1
      - MESH_STATE_V1
      - HIVE_WORLD_PULSE_V1
      - WORLD_UPDATE_V1
  accepts:
    - OAA_MEMORY_ENTRY_V1
    - EPICON_ENTRY_V1
    - MIC_READINESS_V1
    - MIC_SEAL_V1
    - MIC_RESERVE_RECONCILIATION_V1
    - MIC_GENESIS_BLOCK
    - MOBIUS_PULSE_V1
    - MESH_STATE_V1
    - HIVE_WORLD_PULSE_V1
    - WORLD_UPDATE_V1

mcp:
  enabled: true
  server_url: "https://civic-protocol-core-ledger.onrender.com/api/mcp"
  discovery_url: "https://civic-protocol-core-ledger.onrender.com/.well-known/mcp.json"
  transport: "streamable-http"
  schema_version: "MCP-2025-03-26"
  integrity:
    require_gi_above: 0.5
    log_all_invocations: true
    invocation_agent: "HERMES"
    verification_agent: "ZEUS"
    mic_reward_on_invocation: false
  tools:
    - name: "get_integrity_snapshot"
      description: "GI snapshot plus ledger chain stats when GI_STATE_JSON is configured"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:integrity-read"
    - name: "get_epicon_feed"
      description: "Recent EPICON entries (local feed + ingested mesh)"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:ledger-read"
    - name: "get_vault_status"
      description: "MIC vault snapshot via VAULT_META_JSON or placeholder"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:vault-read"
    - name: "get_agent_journal"
      description: "Recent agent-oriented EPICON rows (mcp-bridge, mesh-node)"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:journal-read"
    - name: "post_epicon_entry"
      description: "Submit EPICON intent to civic ledger; GI gate 0.6"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "bearer"
      auth_env: "AGENT_SERVICE_TOKEN"
      epicon_tag: "tool:ledger-write"
      requires_gi_above: 0.6
    - name: "get_mic_readiness"
      description: "MIC readiness JSON from MIC_READINESS_JSON or no_snapshot"
      endpoint: "/api/mcp"
      method: "POST"
      auth: "none"
      epicon_tag: "tool:mic-read"

jobs:
  enabled: true
  status_values:
    - active
    - manual
    - planned
    - archived
  workflows:
    - id: "ledger-pulse-snapshot"
      file: ".github/workflows/ledger-pulse-snapshot.yml"
      status: "active"
      trigger: "schedule"
      cron: "15 */1 * * *"
      role: "ledger_health_snapshot"
      output:
        - "ledger/mesh-pulse-snapshot.json"
    - id: "ledger-mesh-feed-on-push"
      file: ".github/workflows/mesh-sync.yml"
      status: "active"
      trigger: "push"
      branches: ["main"]
      role: "repo_commit_to_epicon_feed"
      output:
        - "ledger/feed.json"

governance:
  agent_prs_allowed: true
  auto_merge_allowed: false
  required_reviewers:
    - "ZEUS"
    - "ATLAS"

policy:
  write_truth_locally: true
  mirror_feed_to_repo: true
  canonical_ledger_node: "civic-protocol-core"
  hash_algorithm: "sha256"
  terminal_is_storage: false
  substrate_is_memory: true
  ledger_is_proof: true
  human_merge_required_for_canon: true
