# Civic-Protocol-Core — MNS node declaration
# Contributor tier: pushes to Substrate on merge, serves ledger feed

mesh:
  node_id: "civic-protocol-core"
  node_type: "service"
  substrate_ref: "kaizencycle/Mobius-Substrate"
  version: "1.0.0"
  tier: "contributor"
  covenant: "integrity"
  agent_affinity:
    - ZEUS      # hash chain verification — ZEUS can attest to Postgres ledger integrity
    - HERMES    # routing authority — HERMES routes EPICONs through this service
  ledger:
    enabled: true
    backend: "render"
    feed_url: "https://civic-protocol-core-ledger.onrender.com/epicon/feed"
    push_to_substrate: true
    push_endpoint: "https://civic-protocol-core-ledger.onrender.com/mesh/ingest"
  mii:
    track: true
    baseline: 0.85
  epicon:
    intent_blocks_required: true
    push_on_merge: true
  mic:
    participate: true
    reward_type: "MIC_REWARD_V2"
    node_role: "ledger-service"
