# MOBIUS-CLASS: ci
# OWNER: @kaizencycle
# INTRODUCED: C-303
# PURPOSE: First CI for Civic-Protocol-Core Python services.
#          Tests, linting (ruff), and type checking across all service modules.

name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**/requirements*.txt'
      - '**/render.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - '**/requirements*.txt'
      - '**/render.yaml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Run ruff
        run: ruff check . --output-format=github

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, identity, mic-indexer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '${{ matrix.service }}/requirements.txt'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d "tests" ] || find . -name "test_*.py" -maxdepth 3 | grep -q .; then
            python -m pytest -x -q
          else
            echo "::warning::No tests found in ${{ matrix.service }} — add tests in a tests/ directory"
          fi

  import-check:
    name: Import check ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ledger
            module: app.main
          - service: identity
            module: app.main
          - service: mic-indexer
            module: app.main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '${{ matrix.service }}/requirements.txt'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest anyio
      - name: Verify import
        working-directory: ${{ matrix.service }}
        env:
          DATABASE_URL: "sqlite:///./ci_test.db"
          SECRET_KEY: "ci-test-key-not-real"
          PORT: "8000"
          POLICY_PATH: "./policy.yaml"
          INDEX_DB: "./data/index.db"
        run: |
          python -c "
          import importlib, sys
          try:
              importlib.import_module('${{ matrix.module }}')
              print('✅ ${{ matrix.service }} imports clean')
          except Exception as e:
              print(f'❌ Import/runtime error in ${{ matrix.service }}: {e}')
              sys.exit(1)
          "

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, import-check]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🏛️ Civic Protocol Core CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Import Check | ${{ needs.import-check.result }} |" >> $GITHUB_STEP_SUMMARY
