name: cpc-post-deploy-drift-gate

# C-372: Post-deploy tripwire — probe live CPC AFTER Render serves the new revision.
#
# Does NOT run on push: push fires before Render finishes building, causing false
# drift failures while the previous deployment is still live (see fire-drift-routine.yml).
#
# Triggers:
#   repository_dispatch (cpc-deploy-live) — from deploy-shim after deploy_succeeded
#   workflow_dispatch — manual post-deploy gate

on:
  repository_dispatch:
    types: [cpc-deploy-live]
  workflow_dispatch:
    inputs:
      url:
        description: 'Live ledger base URL to probe'
        required: false
        default: 'https://civic-protocol-core-ledger.onrender.com'
      rollout_patience:
        description: 'Retry drift probe on exit 1 (in-flight deploy window)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  issues: write

env:
  CPC_LIVE_URL: ${{ github.event.inputs.url || 'https://civic-protocol-core-ledger.onrender.com' }}

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Probe live CPC for route drift
        id: drift
        env:
          EVENT_NAME: ${{ github.event_name }}
          ROLLOUT_INPUT: ${{ github.event.inputs.rollout_patience || 'false' }}
        run: |
          set +e
          if [ "$EVENT_NAME" = "repository_dispatch" ] || [ "$ROLLOUT_INPUT" = "true" ]; then
            ROLLOUT_ATTEMPTS=15
            ROLLOUT_DELAY=60
            echo "Rollout patience enabled — up to $((ROLLOUT_ATTEMPTS * ROLLOUT_DELAY))s for live to catch up"
          else
            ROLLOUT_ATTEMPTS=1
            ROLLOUT_DELAY=0
          fi

          code=2
          for attempt in $(seq 1 "$ROLLOUT_ATTEMPTS"); do
            python3 scripts/check_deploy_drift.py \
              --url "$CPC_LIVE_URL" \
              --attempts 6 \
              --base-delay 8 2>&1 | tee /tmp/drift_output.txt
            code=${PIPESTATUS[0]}

            if [ "$code" -eq 0 ]; then
              echo "Drift check OK on attempt ${attempt}"
              break
            fi

            if [ "$code" -eq 1 ] && [ "$attempt" -lt "$ROLLOUT_ATTEMPTS" ]; then
              echo "::warning::Drift on attempt ${attempt}/${ROLLOUT_ATTEMPTS} — may be in-flight deploy; retrying in ${ROLLOUT_DELAY}s"
              sleep "$ROLLOUT_DELAY"
              continue
            fi

            if [ "$code" -eq 2 ] || [ "$code" -eq 4 ]; then
              if [ "$attempt" -lt "$ROLLOUT_ATTEMPTS" ]; then
                echo "::warning::Probe inconclusive (exit ${code}) on attempt ${attempt}; retrying in ${ROLLOUT_DELAY}s"
                sleep "$ROLLOUT_DELAY"
                continue
              fi
            fi

            break
          done
          set -e

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "drift_output<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/drift_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Canon route smoke (manifest + verify)
        if: steps.drift.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          for path in /api/canon/reserve-blocks/manifest /api/canon/reserve-blocks/verify; do
            code=$(curl -sS -o /tmp/smoke.json -w "%{http_code}" "${CPC_LIVE_URL}${path}")
            echo "${path} → HTTP ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::Canon smoke failed: ${path} returned ${code}"
              exit 1
            fi
          done
          echo "Canon routes smoke OK ✓"

      - name: Open issue on deploy drift (exit 1)
        if: steps.drift.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'CPC deploy drift detected — canon routes missing on live';
            const body = [
              '**Auto-filed by cpc-post-deploy-drift-gate**',
              '',
              'Live CPC is missing expected operations from `scripts/expected_routes.json`.',
              'Canon reserve-block anchoring and vault manifest proxy will 404 until redeployed.',
              '',
              '```',
              process.env.DRIFT_OUTPUT,
              '```',
              '',
              '**Remediation:**',
              '1. Provision/wire persistent `DATABASE_URL` (Postgres) on civic-ledger-api',
              '2. Redeploy CPC from current `main`',
              '3. Run `check_deploy_drift.py` until exit 0',
              '4. Replay anchors: `node scripts/replay-canon-anchors.mjs` (terminal repo)',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-drift',
            });
            if (existing.data.some((i) => i.title === title)) {
              core.info('Open deploy-drift issue already exists — skipping duplicate');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['deploy-drift', 'infra', 'C-372'],
            });
        env:
          DRIFT_OUTPUT: ${{ steps.drift.outputs.drift_output }}

      - name: Fail gate on drift
        if: steps.drift.outputs.exit_code == '1'
        run: |
          echo "::error::Deploy drift — redeploy CPC from main before canon lanes can work"
          exit 1

      - name: Warn on inconclusive probe
        if: steps.drift.outputs.exit_code == '2' || steps.drift.outputs.exit_code == '4'
        run: |
          echo "::warning::Drift probe inconclusive (exit ${{ steps.drift.outputs.exit_code }}) — manual check required"
          echo "${{ steps.drift.outputs.drift_output }}"

      - name: Fail on checker usage errors
        if: steps.drift.outputs.exit_code == '3'
        run: |
          echo "::error::check_deploy_drift.py usage/IO error (exit 3)"
          exit 3
