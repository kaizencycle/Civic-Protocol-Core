name: deploy-drift-alarm

# C-332: catch the silent deploy drift that left live ~10 routes behind main for
# multiple cycles (/api/vault/*, /api/seal/*, /api/epicon/ingest returning 404).
#
# Two triggers:
#   - schedule: daily — catches a silent rollback or stalled deploy weeks later.
#   - workflow_dispatch: manual / post-deploy gate — run right after shipping main
#     to confirm the live surface caught up.
#
# Exit semantics (scripts/check_deploy_drift.py):
#   0 OK · 1 DRIFT (fail) · 2 UNRESOLVED · 4 BLOCKED (IP allowlist) (cold start/outage — warn, don't hard-fail)

on:
  schedule:
    - cron: '0 13 * * *' # daily 13:00 UTC
  workflow_dispatch:
    inputs:
      url:
        description: 'Live ledger base URL to probe'
        required: false
        default: 'https://civic-protocol-core-ledger.onrender.com'

permissions:
  contents: read

jobs:
  manifest-selftest:
    # Guards against manifest rot: the committed manifest MUST equal what the
    # current code generates, else the alarm would compare against a stale baseline.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install minimal deps to import the app
        run: pip install -r requirements.txt
      - name: Regenerate manifest and assert it matches the committed copy
        env:
          LEDGER_ALLOW_EPHEMERAL: 'true'
          DATABASE_URL: 'sqlite:////tmp/ci_manifest.db'
          LEDGER_DATA_DIR: '/tmp'
        run: |
          cp scripts/expected_routes.json /tmp/committed.json
          python3 scripts/gen_route_manifest.py
          if ! diff -u /tmp/committed.json scripts/expected_routes.json; then
            echo "::error::expected_routes.json is stale. Run scripts/gen_route_manifest.py and commit."
            exit 1
          fi
          echo "manifest matches current code ✓"

  drift-check:
    needs: manifest-selftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Probe live deployment for route drift
        id: drift
        run: |
          URL="${{ github.event.inputs.url || 'https://civic-protocol-core-ledger.onrender.com' }}"
          set +e
          python3 scripts/check_deploy_drift.py --url "$URL" --attempts 6 --base-delay 8 2>&1 | tee /tmp/drift_output.txt
          code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "4" ]; then
            echo "::warning::Probe blocked by Render inbound IP allowlist (exit 4) — inconclusive, not drift."
            exit 0
          fi
          if [ "$code" = "2" ]; then
            echo "::warning::Ledger unreachable within cold-start budget — inconclusive (not failing the run)."
            exit 0
          fi
          exit $code
      - name: Fire sentinel routine with captured output (MODE A pass-through)
        if: ${{ !cancelled() && secrets.ROUTINE_TRIGGER_ID != '' }}
        env:
          ROUTINE_TRIGGER_ID: ${{ secrets.ROUTINE_TRIGGER_ID }}
          ROUTINE_TOKEN: ${{ secrets.ROUTINE_TOKEN }}
          DRIFT_EXIT: ${{ steps.drift.outputs.exit_code }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
        run: |
          python3 - <<'PYEOF' | curl -fsS -X POST \
              "https://api.anthropic.com/v1/claude_code/routines/${ROUTINE_TRIGGER_ID}/fire" \
              -H "Authorization: Bearer ${ROUTINE_TOKEN}" \
              -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
              -H "anthropic-version: 2023-06-01" \
              -H "Content-Type: application/json" \
              --data @-
          import json, os, pathlib
          output = pathlib.Path("/tmp/drift_output.txt").read_text() if pathlib.Path("/tmp/drift_output.txt").exists() else "(no output captured)"
          text = (
              f"DRIFT_CHECK_OUTPUT (exit={os.environ['DRIFT_EXIT']}):\n"
              + output
              + f"\n\nsha={os.environ['GIT_SHA']} ref={os.environ['GIT_REF']}"
          )
          print(json.dumps({"text": text}))
          PYEOF
