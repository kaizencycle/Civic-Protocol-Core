services:
  - type: web
    name: mobius-identity
    env: python
    plan: free
    region: oregon
    runtime: python
    rootDir: identity
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # C-358: persistent disk — without this, SQLite users are wiped every deploy.
    disk:
      name: identity-data
      mountPath: /var/lib/identity
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/lib/identity/identity.db
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
