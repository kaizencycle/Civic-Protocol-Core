services:
  - type: web
    name: mobius-identity
    env: python
    plan: starter
    region: oregon
    runtime: python
    rootDir: identity
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # C-358: persistent disk — without this, SQLite users are wiped every deploy.
    # Render requires starter+ for persistent disks on web services.
    disk:
      name: identity-data
      mountPath: /var/lib/identity
      sizeGB: 1
    envVars:
      # Operator-supplied — when unset, app defaults to disk-backed SQLite at /var/lib/identity.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
