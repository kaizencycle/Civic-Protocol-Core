services:
  - type: web
    name: mobius-identity
    env: python
    plan: free
    region: oregon
    runtime: python
    rootDir: identity
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # C-303: added autoDeploy and disk for SQLite persistence.
    # Without a disk mount on Render free plan, SQLite data is wiped on every deploy.
    # Wire DATABASE_URL to a managed Postgres to remove this constraint.
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production
