services:
  - type: web
    name: mobius-identity
    env: python
    plan: free
    region: oregon
    runtime: python
    rootDir: identity
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "8000"
