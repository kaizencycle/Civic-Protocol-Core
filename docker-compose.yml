version: '3.8'

services:
  # Civic Protocol Core Development Node
  civic-devnode:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5411:5411"
    environment:
      - CIVIC_ENV=development
      - CIVIC_LOG_LEVEL=debug
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python sdk/python/devnode.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres

  # Shield Service (Lab6)
  shield:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7000:7000"
    environment:
      - PORT=7000
    volumes:
      - ./lab6-proof:/app/lab6-proof
    working_dir: /app/lab6-proof
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 7000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # MIC Indexer Service
  mic-indexer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MIC_DB_URL=postgresql://civic:civic_password@postgres:5432/civic_protocol
      - LAB4_BASE=http://civic-devnode:5411
      - POLICY_PATH=./policy.yaml
      - INDEX_DB=./data/index.db
    volumes:
      - ./mic-indexer:/app/mic-indexer
      - mic_indexer_data:/app/mic-indexer/data
    working_dir: /app/mic-indexer
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres

  # Identity Service
  identity:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DATABASE_URL=postgresql://civic:civic_password@postgres:5432/civic_protocol
      - SECRET_KEY=mobius-dev-secret-change-in-production
    volumes:
      - ./identity:/app/identity
    working_dir: /app/identity
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres

  # MIC Wallet Service
  mic-wallet:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - DATABASE_URL=postgresql://civic:civic_password@postgres:5432/civic_protocol
      - SECRET_KEY=mobius-dev-secret-change-in-production  # Must match Identity Service
    volumes:
      - ./mic-wallet:/app/mic-wallet
    working_dir: /app/mic-wallet
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres
      - identity

  # Redis for caching and queuing
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=civic_protocol
      - POSTGRES_USER=civic
      - POSTGRES_PASSWORD=civic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - civic-devnode
      - identity
      - mic-wallet
      - mic-indexer
      - shield
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

  # Example application
  hello-reflection-app:
    build:
      context: ./examples/hello-reflection-app
      dockerfile: Dockerfile
    environment:
      - CIVIC_API_URL=http://civic-devnode:5411
    depends_on:
      - civic-devnode
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  mic_indexer_data:

networks:
  default:
    name: civic-protocol-network
