[lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM", "S"]
ignore = ["E501", "B008", "UP007"]

[lint.per-file-ignores]
"**/migrations/**" = ["E501", "F401"]
"**/__init__.py" = ["F401"]
"**/test_*.py" = ["S101", "S108", "S603"]
"deploy-shim/shim.py" = ["S104"]
"examples/**" = ["S113"]
"get_lab4_token.py" = ["S113"]
"gic-indexer/app/main.py" = ["S104", "S112"]
"identity/app/main.py" = ["S104"]
"lab6-proof/app/main.py" = ["S104"]
"ledger/app/db.py" = ["S108"]
"ledger/app/main.py" = ["S104"]
"ledger/app/mcp_integrity.py" = ["S108"]
"ledger/app/mesh/registry.py" = ["S108", "S310"]
"ledger/app/routes/seal_reconciliation.py" = ["S101"]
"mic-indexer/app/main.py" = ["S104", "S112"]
"mic-wallet/app/main.py" = ["S104"]
"scripts/check_deploy_drift.py" = ["S310"]
"scripts/gen_route_manifest.py" = ["S108"]
"scripts/render_start_ledger.py" = ["S104"]
"sdk/python/anchor.py" = ["S106"]
"sdk/python/identity_client.py" = ["S101"]
"start-all-services.py" = ["S104", "S602"]

[format]
quote-style = "double"
indent-style = "space"
